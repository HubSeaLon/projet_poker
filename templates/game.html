<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partie en Cours</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.min.js"></script>
</head>
<body>
    <h1>Planning Poker</h1>
    
    <h2>Joueurs</h2>
    <ul id="players">
        {% for player in players %}
            <li>{{ player }}</li>
        {% endfor %}
    </ul>

    <h2>Votes</h2>
    <ul id="votes"></ul>

    <form id="vote-form">
        <label for="vote">Votre vote :</label>
        <input type="number" id="vote" name="vote" min="1" max="10" required><br>
        <button type="submit">Soumettre le vote</button>
    </form>

    <script>
        const socket = io.connect(location.protocol + '//' + document.domain + ':' + location.port);
        
        // Récupérer les données de session
        const sessionId = "{{ session_id }}";
        const username = prompt("Entrez votre pseudo :");

        // Rejoindre la session
        socket.emit('join', { session_id: sessionId, username: username });

        // Envoie le vote
        document.getElementById("vote-form").onsubmit = (e) => {
            e.preventDefault();
            const vote = document.getElementById("vote").value;
            socket.emit('vote', { session_id: sessionId, username: username, vote: vote });
        };

        // Recevoir les votes en temps réel
        socket.on('vote_received', (data) => {
            const voteList = document.getElementById("votes");
            const newVote = document.createElement("li");
            newVote.textContent = `${data.username} a voté ${data.vote}`;
            voteList.appendChild(newVote);
        });

        // Affiche les messages de statut
        socket.on('status', (data) => {
            const voteList = document.getElementById("votes");
            const statusMessage = document.createElement("li");
            statusMessage.textContent = data.msg;
            voteList.appendChild(statusMessage);
        });
    </script>
</body>
</html>
